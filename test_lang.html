<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
[data-lang] { display: none; }
[data-lang].active { display: block; }
span[data-lang] { display: none; }
span[data-lang].active { display: inline; }
</style>
</head>
<body>
<select onchange="setLang(this.value)" id="lang-select">
  <option value="en">EN</option>
  <option value="fr">FR</option>
  <option value="de">DE</option>
</select>

<h1>
  <span data-lang="en">Hello in English</span>
  <span data-lang="fr">Bonjour en Français</span>
  <span data-lang="de">Hallo auf Deutsch</span>
</h1>

<script>
function setLang(lang) {
  document.querySelectorAll('[data-lang]').forEach(function(el) {
    if (el.getAttribute('data-lang') === lang) {
      el.classList.add('active');
    } else {
      el.classList.remove('active');
    }
  });
  document.getElementById('lang-select').value = lang;
}

window.addEventListener('load', function() {
  setLang('en');
});
</script>
</body>
</html>
